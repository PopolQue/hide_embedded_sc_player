<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klein und Haarig</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #242430;
            color: #ffffffde;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing {
            max-width: 600px;
            padding: 40px 24px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 18px;
            color: #9ca3af;
            margin-bottom: 40px;
        }
        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            text-align: left;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 20px;
        }
        .info-card h3 {
            font-size: 14px;
            color: #aa3bff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-card p {
            font-size: 15px;
            line-height: 1.5;
            color: #9ca3af;
        }
        .info-card a {
            color: #ffffffde;
            text-decoration: none;
        }
        .info-card a:hover {
            text-decoration: underline;
        }
        .listen-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            padding: 12px 24px;
            background: #aa3bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .listen-btn:hover {
            background: #9a2bff;
        }
        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .info-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="landing">
        <img src="/raupe_kuh_2025.svg" alt="KUH" class="logo">
        <h1>Klein und Haarig</h1>
        <p class="subtitle">Ein Festival von Bunte Platte e.V.</p>
        
        <div class="info-cards">
            <div class="info-card">
                <h3>Recordings</h3>
                <p>Alle Sets der letzten Jahre zum Nachhören</p>
            </div>
            <div class="info-card">
                <h3>Kontakt</h3>
                <p><a href="mailto:info@kleinundhaarig.de">info@kleinundhaarig.de</a></p>
            </div>
            <div class="info-card">
                <h3>SoundCloud</h3>
                <p><a href="https://soundcloud.com/kleinundhaarig" target="_blank" rel="noopener">soundcloud.com/kleinundhaarig</a></p>
            </div>
            <div class="info-card">
                <h3>Instagram</h3>
                <p><a href="https://instagram.com/kleinundhaarig" target="_blank" rel="noopener">@kleinundhaarig</a></p>
            </div>
        </div>
        
        <p style="margin-top: 32px; color: #666; font-size: 13px;">Nutze den Player unten um die Recordings zu hören</p>
    </div>
</body>
</html>
